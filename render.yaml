services:
  - type: web
    name: automotive-telemetry-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: automotive-telemetry-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: automotive-telemetry-db
    databaseName: telemetry
    user: telemetry_user
    region: oregon
    plan: free
